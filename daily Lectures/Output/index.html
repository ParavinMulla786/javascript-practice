<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Hello World</h1>
    <p id="web">My first Website</p>
    <!-- // Using document.write() after an HTML document is loaded, will delete all existing HTML: -->

    <button type="button" onclick="document.write(5 + 2)">Try It</button>


    <!-- JavaScript Print
JavaScript does not have any print object or print methods.

You cannot access output devices from JavaScript.

The only exception is that you can call the window.
print() method in the browser to print the content of the current window. -->

<button onclick="window.print()">Print This Page</button>
  </body>
  <script>
    //      <!-- JavaScript Display Possibilities
    // JavaScript can "display" data in different ways:

    // Writing into an HTML element, using innerHTML or innerText.
    // Writing into the HTML output using document.write().
    // Writing into an alert box, using window.alert().
    // Writing into the browser console, using console.log() -->

    // Using innerText
    // To access an HTML element, use the document.getElementById(id) method.

    // Then use the innerText property to change the inner text of the HTML element:

    document.getElementById("web").innerText = "My First Website";

    //     Using document.write()
    // For testing purposes, it is convenient to use document.write():
    document.write(5 + 9);

    // Using window.alert()
    // You can use an alert box to display data:

    window.alert("Welcome!");

    // You can skip the window keyword.

    // In JavaScript, the window object is the global scope object.
    //  This means that variables, properties, and methods by default belong to the window object.
    //  This also means that specifying the window keyword is optional:

    alert("Hiii!");
  

//     Using console.log()
// For debugging purposes, you can call the console.log() method in the browser to display data.

console.log(5 + 6);


// JavaScript Print
// JavaScript does not have any print object or print methods.

// You cannot access output devices from JavaScript.

// The only exception is that you can call the window.
// print() method in the browser to print the content of the current window.

  </script>
</html>
