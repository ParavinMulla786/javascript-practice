<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
 <div class="container">
    <h1>Password generator</h1>
     <label for="length">Password Length</label>
    <input type="text" class="form-control" placeholder="Enter length">
   
   
  <label><input type="checkbox" name="interest" value="numbers">include numbers</label><br>
  <label><input type="checkbox" name="interest" value="uppercase"> include uppercase</label><br>
  <label><input type="checkbox" name="interest" value="special"> include special characters</label>
    <label><input type="checkbox" name="interest" value="ambigious"> exclude ambigious characters</label>
   
    <button>Generate Password</button>
    <label for="password">Generated Password</label>
    <input type="password" class="form-control" id="password">
     <label><input type="checkbox" name="showp" value="showp"> Show passoword</label>

     <div class="progress" role="progressbar" aria-label="Example" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
  <div class="progress-bar" style="width: 25%"></div>
</div>

</div>

 </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
