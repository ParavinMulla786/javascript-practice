<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title of the webpage -->
    <title>To-Do App</title>

    <!-- Bootstrap CSS for styling (buttons, layout, etc.) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS file for custom design -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Bootstrap container to center content -->
<div class="container mt-5">

    <!-- Card component for nice UI box -->
    <div class="card shadow p-4">
        
        <!-- Heading of the app -->
        <h2 class="text-center mb-3">To Do App</h2>

        <!-- Description paragraph (text added using JavaScript) -->
        <p id="description" class="text-center text-muted"></p>

        <!-- Input field to enter new task -->
        <input 
            type="text" 
            id="inputToDo" 
            class="form-control mb-3" 
            placeholder="Enter task"
        >

        <!-- Button to add new task -->
        <!-- onclick calls JavaScript function -->
        <button 
            class="btn btn-primary w-100 mb-3" 
            onclick="addNewTask()"
        >
            Add Task
        </button>

        <!-- Unordered list where tasks will be displayed -->
        <!-- Data comes dynamically from JavaScript -->
        <ul id="tasksUL" class="list-group"></ul>

    </div>
</div>

<!-- Linking external JavaScript file -->
<script src="script.js"></script>

<!-- Bootstrap JS (for components like modal, dropdown, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
