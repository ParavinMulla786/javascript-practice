<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1 class="text-primary text-center display-4" >Project Management</h1>
    
    <nav class= "d-flex gap-2 mb-3">
        <input type="text"  id="searchkey">
        <button class="btn btn-primary " onclick="searchdata()">Search</button>
   
   
          <select id="statusFilter" class="form-select">
        <option value="">All Status</option>
        <option value="Completed">Completed</option>
        <option value="In Progress">In Progress</option>
        <option value="Pending">Pending</option>
    </select>

    <select id="priorityFilter" class="form-select">
        <option value="">All Priority</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
    </select>

    <button class="btn btn-primary" onclick="filterData()">Filter</button>
</nav>
   
   
 
    
    
    <div class="container">
     <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Project Title</th>
      <th scope="col">Department</th>
      <th scope="col">Priority</th>
       <th scope="col">Status</th>
        <th scope="col">start date</th>
         <th scope="col">End Date</th>
    </tr>
    </thead>
    <tbody id="projectRows"></tbody>
    </table>

   <nav>
  <ul class="pagination" id="pagination">
    <li class="page-item">
      <a class="page-link" href="#" id="prevBtn">Previous</a>
    </li>

    <!-- Page numbers will come dynamically -->

    <li class="page-item">
      <a class="page-link" href="#" id="nextBtn">Next</a>
    </li>
  </ul>
</nav>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
